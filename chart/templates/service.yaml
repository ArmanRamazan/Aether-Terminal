apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-aether-terminal
  labels:
    app: aether-terminal
    release: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - name: web
      port: {{ .Values.service.web.port }}
      targetPort: web
      protocol: TCP
    - name: grpc
      port: {{ .Values.service.grpc.port }}
      targetPort: grpc
      protocol: TCP
  selector:
    app: aether-terminal
    release: {{ .Release.Name }}
