phase: "ms1-workspace-setup"
description: "Create cargo workspace with 6 crates, core types and traits"

tasks:
  - id: workspace-init
    title: "Initialize cargo workspace with 6 crates"
    agent: rust-engineer
    scope: workspace
    type: feat
    context: |
      See docs/plans/2026-03-08-aether-terminal-design.md for full architecture.
      Workspace structure:
        crates/aether-terminal/  (bin, depends on all)
        crates/aether-core/      (lib, no deps)
        crates/aether-ingestion/ (lib, depends on core)
        crates/aether-render/    (lib, depends on core)
        crates/aether-mcp/       (lib, depends on core)
        crates/aether-gamification/ (lib, depends on core)
    prompt: |
      Create a Rust cargo workspace for the Aether-Terminal project.

      1. Create root Cargo.toml as workspace:
         ```toml
         [workspace]
         resolver = "2"
         members = [
           "crates/aether-terminal",
           "crates/aether-core",
           "crates/aether-ingestion",
           "crates/aether-render",
           "crates/aether-mcp",
           "crates/aether-gamification",
         ]
         ```

      2. Create each crate with `cargo init`:
         - aether-terminal: binary crate
         - All others: library crates

      3. Set up dependencies in each crate's Cargo.toml:
         - aether-core: petgraph, glam, serde (with derive), tokio (full)
         - aether-ingestion: aether-core (path = "../aether-core"), sysinfo, tokio (full)
         - aether-render: aether-core (path), ratatui, crossterm, glam
         - aether-mcp: aether-core (path), serde_json, tokio (full), axum
         - aether-gamification: aether-core (path), rusqlite (with bundled feature)
         - aether-terminal: all 5 crates as path deps, clap (with derive), tokio (full), tracing, tracing-subscriber

      4. Each lib crate should have a minimal lib.rs with a comment about its purpose.
      5. aether-terminal/src/main.rs should have a minimal main() that prints "Aether Terminal v0.1.0".

      6. Verify: `cargo check --workspace` must pass.

      COMMIT: feat(workspace): initialize cargo workspace with 6 crates
    test: "cargo check --workspace"
    depends_on: []

  - id: core-types
    title: "Define core types and trait abstractions"
    agent: rust-engineer
    scope: core
    type: feat
    context: |
      See design doc Component 1: aether-core.
      Key types: ProcessNode, NetworkEdge, ProcessState, Protocol, ConnectionState.
      Key traits: SystemProbe, Storage.
      Graph: petgraph::Graph<ProcessNode, NetworkEdge>.
      Events: SystemEvent, GameEvent, AgentAction.
    prompt: |
      Implement the aether-core crate with all type definitions.

      File: crates/aether-core/src/models.rs
      ```rust
      use glam::Vec3;
      use serde::{Deserialize, Serialize};
      use std::net::SocketAddr;

      #[derive(Debug, Clone, Serialize, Deserialize)]
      pub struct ProcessNode {
          pub pid: u32,
          pub ppid: u32,
          pub name: String,
          pub cpu_percent: f32,
          pub mem_bytes: u64,
          pub state: ProcessState,
          pub hp: f32,
          pub xp: u32,
          pub position_3d: Vec3,
      }

      #[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]
      pub enum ProcessState {
          Running,
          Sleeping,
          Zombie,
          Stopped,
      }

      #[derive(Debug, Clone, Serialize, Deserialize)]
      pub struct NetworkEdge {
          pub source_pid: u32,
          pub dest: SocketAddr,
          pub protocol: Protocol,
          pub bytes_per_sec: u64,
          pub state: ConnectionState,
      }

      #[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]
      pub enum Protocol {
          TCP, UDP, DNS, QUIC, HTTP, HTTPS, Unknown,
      }

      #[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]
      pub enum ConnectionState {
          Established, Listen, TimeWait, CloseWait,
      }
      ```

      File: crates/aether-core/src/graph.rs
      - WorldGraph struct wrapping petgraph::StableGraph<ProcessNode, NetworkEdge>
      - impl WorldGraph:
        - pub fn new() -> Self
        - pub fn add_process(&mut self, node: ProcessNode) -> NodeIndex
        - pub fn remove_process(&mut self, pid: u32) -> bool
        - pub fn add_connection(&mut self, from_pid: u32, to_pid: u32, edge: NetworkEdge) -> Option<EdgeIndex>
        - pub fn find_by_pid(&self, pid: u32) -> Option<&ProcessNode>
        - pub fn process_count(&self) -> usize
      - Store a HashMap<u32, NodeIndex> for O(1) pid lookups

      File: crates/aether-core/src/events.rs
      - SystemEvent enum: ProcessCreated{pid, name}, ProcessExited{pid}, MetricsUpdate, TopologyChange
      - GameEvent enum: HpChanged{pid, new_hp}, XpEarned{amount}, AchievementUnlocked{name}
      - AgentAction enum: KillProcess{pid}, RestartProcess{pid}, Inspect{pid}

      File: crates/aether-core/src/lib.rs
      - pub mod models, graph, events
      - Re-export key types

      Write unit tests in crates/aether-core/src/graph.rs (#[cfg(test)] module):
      - test_add_and_find_process
      - test_remove_process
      - test_add_connection
      - test_process_count

      COMMIT: feat(core): define core types, world graph and events
    test: "cargo test -p aether-core"
    depends_on: [workspace-init]
