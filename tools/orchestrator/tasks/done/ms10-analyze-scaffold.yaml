    prompt: |
      Implement MetricStore in crates/aether-analyze/src/store.rs.

      - MetricKey { host: HostId, pid: Option<u32>, metric: String } — Hash, Eq, Clone
      - MetricStore { series: HashMap<MetricKey, TimeSeries>, capacity: usize }
        - new(capacity: usize) -> Self — default 3600
        - ingest_world_state(&mut self, host: &HostId, world: &WorldGraph)
          - For each process: push cpu_percent, mem_bytes into per-pid TimeSeries
          - Host-level: push total_cpu (sum), total_memory (sum), process_count
        - ingest_remote(&mut self, series: Vec<TimeSeries>)
          - Parse labels (host, pid, __name__) to construct MetricKey, merge samples
        - get(&self, host: &HostId, pid: Option<u32>, metric: &str) -> Option<&TimeSeries>
        - process_metrics(&self, host: &HostId, pid: u32) -> Vec<(&str, &TimeSeries)>
        - host_metrics(&self, host: &HostId) -> Vec<(&str, &TimeSeries)>
        - hosts(&self) -> Vec<&HostId>
        - cleanup_dead_processes(&mut self, host: &HostId, alive_pids: &HashSet<u32>)

      Update lib.rs: pub mod store;

      Tests:
      - test_ingest_world_state_creates_series — build WorldGraph with 1 process, ingest, verify get() returns Some
      - test_ingest_multiple_builds_history — ingest 5 times, check TimeSeries len=5
      - test_get_nonexistent_returns_none
      - test_cleanup_removes_dead — ingest pid 100, cleanup with empty set, verify None
      - test_host_metrics_returns_aggregates

