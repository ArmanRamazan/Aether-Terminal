phase: "ms11-advanced-analyzers"
description: "MVP Phase 2b: Correlation, anomaly analyzers, 30+ rules, full diagnostics UI"

tasks:
  - id: correlation-analyzer
    title: "Implement CorrelationAnalyzer with Pearson coefficient"
    agent: rust-engineer
    scope: analyze
    type: feat
    context: |
      CRITICAL: Follow Architecture Principles and Rust Best Practices from root CLAUDE.md strictly.

      EXISTING CODE:
      - analyzers/trend.rs: TrendAnalyzer, analyzers/capacity.rs: CapacityAnalyzer
      - aether-core: TimeSeries with samples VecDeque<MetricSample>
    prompt: |
      Implement CorrelationAnalyzer.

      File: crates/aether-analyze/src/analyzers/correlation.rs
      - Correlation { pub metric_a: String, pub metric_b: String, pub coefficient: f64, pub interpretation: String }
      - CorrelationAnalyzer (unit struct):
        - correlate(&self, a: &TimeSeries, b: &TimeSeries, window: Duration) -> f64
          - Align samples by nearest timestamp
          - Pearson: r = Σ(xi-x̄)(yi-ȳ) / sqrt(Σ(xi-x̄)² * Σ(yi-ȳ)²)
          - If <2 aligned points → 0.0
        - find_correlated(&self, target: &TimeSeries, candidates: &[&TimeSeries], threshold: f64) -> Vec<Correlation>
          - Filter pairs where |r| > threshold
        - interpret(r: f64) -> &'static str
          - |r| > 0.9: "very strongly", > 0.7: "strongly", > 0.5: "moderately", else "weakly"

      Update analyzers/mod.rs: pub mod correlation;

      Tests:
      - test_perfect_positive — identical series → r ≈ 1.0
      - test_perfect_negative — inverse → r ≈ -1.0
      - test_uncorrelated — unrelated → |r| < 0.3
      - test_find_correlated_filters
      - test_empty_series_zero

      COMMIT: feat(analyze): implement CorrelationAnalyzer with Pearson coefficient
    test: "cargo test -p aether-analyze"
    depends_on: []

  - id: anomaly-detector
    title: "Implement deterministic AnomalyDetector"
    agent: rust-engineer
    scope: analyze
    type: feat
    context: |
      CRITICAL: Follow Architecture Principles and Rust Best Practices from root CLAUDE.md strictly.

      EXISTING CODE:
      - aether-core: TimeSeries, MetricSample
      - analyzers/: trend.rs, capacity.rs, correlation.rs
    prompt: |
      Implement AnomalyDetector.

      File: crates/aether-analyze/src/analyzers/anomaly.rs
      - ChangePoint { pub index: usize, pub magnitude: f64 }
      - AnomalyDetector (unit struct):
        - z_score(&self, series: &TimeSeries, window: Duration) -> f64
          - (last_value - mean) / stddev. If stddev ≈ 0 → 0.0
        - is_outlier_zscore(&self, series: &TimeSeries, threshold: f64) -> bool
          - |z_score| > threshold
        - is_outlier_iqr(&self, series: &TimeSeries) -> bool
          - Sort values, compute Q1 (25th), Q3 (75th), IQR = Q3-Q1
          - Last value > Q3 + 1.5*IQR or < Q1 - 1.5*IQR
        - change_points(&self, series: &TimeSeries, sensitivity: f64) -> Vec<ChangePoint>
          - Sliding window (size=10): compare mean of left window vs right window
          - If |diff| > sensitivity * global_stddev → ChangePoint
        - stddev(&self, series: &TimeSeries, window: Duration) -> f64
        - percentile(&self, series: &TimeSeries, p: f64) -> f64
          - p in 0.0..=1.0, linear interpolation

      Update analyzers/mod.rs: pub mod anomaly;

      Tests:
      - test_z_score_normal — value near mean → z ≈ 0
      - test_z_score_outlier — 5 stddev above → z ≈ 5
      - test_iqr_detects_outlier
      - test_iqr_normal_not_outlier
      - test_change_point_level_shift — [50..50, 100..100] → detects change
      - test_change_point_stable_no_detection
      - test_percentile_median — [1..100] 50th ≈ 50

      COMMIT: feat(analyze): implement deterministic AnomalyDetector
    test: "cargo test -p aether-analyze"
    depends_on: []

