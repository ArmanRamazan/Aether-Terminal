  - id: engine-collectors-integration
    title: "Integrate collectors into AnalyzeEngine"
    agent: rust-engineer
    scope: analyze
    type: feat
    context: |
      CRITICAL: Follow Architecture Principles and Rust Best Practices from root CLAUDE.md strictly.

      EXISTING CODE:
      - engine.rs: AnalyzeEngine with run() loop (ingest → evaluate → generate → send)
      - collectors/procfs.rs: ProcfsCollector with process_profile(), host_profile()
      - collectors/cgroup.rs: CgroupCollector with limits() → CgroupLimits → ProcessLimits
      - rules/engine.rs: evaluate() now accepts HashMap<u32, ProcessLimits>
    prompt: |
      Extend AnalyzeEngine with collectors.

      File: crates/aether-analyze/src/engine.rs (modify)
      - Add fields: procfs: ProcfsCollector, cgroup: CgroupCollector
      - Add to AnalyzeConfig: pub enable_profiling: bool (default true), pub top_n_profiled: usize (default 10)
      - In run() loop, after ingesting metrics:
        1. Collect host profile → feed host-level metrics (loadavg, meminfo, disk) into store
        2. Get top N processes by CPU (from store)
        3. For top N: collect process_profile + cgroup limits
        4. Build HashMap<u32, ProcessLimits> from cgroup data
        5. Pass limits to rule_engine.evaluate()
        6. Attach ProcessProfile to diagnostics where available (store in side map)
      - Graceful: if any collector fails → log warning, continue with partial data
      - Store profiles: HashMap<u32, ProcessProfile> refreshed each tick

      Tests:
      - test_engine_with_collectors — verify collectors called (mock or real /proc)
      - test_engine_without_collectors_fallback — collectors return errors → engine still works
      - test_top_n_limits_profiling

      COMMIT: feat(analyze): integrate collectors into AnalyzeEngine
    test: "cargo test -p aether-analyze"
    depends_on: [builtin-rules-30]
