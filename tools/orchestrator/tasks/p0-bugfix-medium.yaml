  - id: fix-snapshot-test-edges
    title: "Add test for apply_snapshot edge reconstruction"
    agent: rust-engineer
    scope: core
    type: test
    context: |
      TEST-1: The existing test_apply_snapshot only verifies node reconciliation
      and asserts edge_count() == 0 because snapshot has no edges.
      The edge path was never tested — which is how BUG-1 survived.

      After fix-snapshot-self-loop adds dest_pid, this test validates the fix.
    prompt: |
      Add a test that verifies apply_snapshot correctly reconstructs edges.

      File: crates/aether-core/src/graph.rs (in #[cfg(test)] mod tests)

      Add test: test_apply_snapshot_reconstructs_edges
      - Create two ProcessNodes (pid 1 and pid 2)
      - Create a NetworkEdge with source_pid=1, dest_pid=Some(2)
      - Build SystemSnapshot with both processes and the edge
      - Create empty WorldGraph, call apply_snapshot
      - Assert: process_count() == 2
      - Assert: edge_count() == 1
      - Get the edge and verify it connects pid 1 → pid 2 (not a self-loop)

      Add test: test_apply_snapshot_clears_old_edges
      - Build graph with edge between pid 1 → 2
      - Apply snapshot with same processes but NO edges
      - Assert: edge_count() == 0

      COMMIT: test(core): add edge reconstruction tests for apply_snapshot
    test: "cargo test -p aether-core"
    depends_on: [fix-snapshot-self-loop]
